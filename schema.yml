components:
  schemas:
    City:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        _created_by:
          type: string
          readOnly: true
          title: ' created by'
        created_by:
          type: string
          readOnly: true
        _updated_by:
          type: string
          readOnly: true
          title: ' updated by'
        updated_by:
          type: string
          readOnly: true
        created_at:
          type: string
          readOnly: true
        updated_at:
          type: string
          readOnly: true
        can_delete:
          type: string
          readOnly: true
        label:
          type: string
          nullable: true
          maxLength: 310
        state:
          type: string
          format: uuid
          title: Unique id
          nullable: true
        state_detail:
          allOf:
          - $ref: '#/components/schemas/State'
          readOnly: true
      required:
      - _created_by
      - _updated_by
      - can_delete
      - created_at
      - created_by
      - id
      - state_detail
      - updated_at
      - updated_by
    CityRequest:
      type: object
      properties:
        label:
          type: string
          nullable: true
          maxLength: 310
        state:
          type: string
          format: uuid
          title: Unique id
